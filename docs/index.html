<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>おみくじポケット</title>
    <meta
      name="description"
      content="Pythonおみくじから発展した、ブラウザで遊べる小さなおみくじWeb UIです。"
    >
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="brand-row" aria-label="おみくじポケット">
          <div class="brand-lights" aria-hidden="true">
            <span class="brand-dot brand-dot-red"></span>
            <span class="brand-dot brand-dot-blue"></span>
            <span class="brand-dot brand-dot-yellow"></span>
          </div>
          <button class="sound-button" id="soundButton" type="button" aria-pressed="false">
            BGM OFF
          </button>
        </div>

        <div class="intro">
          <p class="mini-label">3Dおみくじ体験</p>
          <h1 id="game-title">おみくじポケット</h1>
        </div>

        <div class="machine scene-machine" aria-live="polite">
          <div class="three-stage">
            <canvas class="fortune-3d" id="fortune3d" aria-label="3Dおみくじ箱"></canvas>
            <button class="stage-hit" id="drawButton" type="button">
              <span>箱を振る</span>
            </button>
            <p class="stage-hint">箱を押すと、くじ棒が飛び出します。</p>

            <div class="ticket" id="ticket">
              <p class="ticket-label">今日の運勢</p>
              <p class="fortune-result" id="fortuneResult">未抽選</p>
              <p class="fortune-message" id="fortuneMessage">
                3Dのおみくじ箱を振って、今日の一枚を引いてみましょう。
              </p>
            </div>
          </div>

          <div class="status-grid" aria-label="プレイ状況">
            <div class="status-card">
              <span class="status-label">引いた回数</span>
              <strong id="drawCount">0回</strong>
            </div>
            <div class="status-card">
              <span class="status-label">今日のベスト</span>
              <strong id="bestFortune">まだなし</strong>
            </div>
          </div>

          <div class="history-panel">
            <div>
              <span class="status-label">最近の結果</span>
              <ol class="history-list" id="historyList">
                <li>まだ引いていません</li>
              </ol>
            </div>
            <button class="reset-button" id="resetButton" type="button">
              記録をリセット
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js"
        }
      }
    </script>
    <script type="module" src="three-scene.js"></script>
    <script src="script.js"></script>
  </body>
</html>
